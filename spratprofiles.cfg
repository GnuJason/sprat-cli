# Default spratlayout profiles.
[profile desktop]
label=Desktop
mode=compact
optimize=gpu
padding=2
extrude=0
max_combinations=0
scale=1
trim_transparent=true
# multipack=false

[profile mobile]
label=Mobile
mode=compact
optimize=gpu
max_width=2048
max_height=2048
padding=2
extrude=0
max_combinations=0
scale=1
trim_transparent=true

[profile legacy]
label=Legacy
mode=pot
optimize=space
max_width=1024
max_height=1024
padding=1
max_combinations=0
scale=1
trim_transparent=true

[profile space]
label=Space Efficient
mode=compact
optimize=space
padding=0
max_combinations=0
rotate=true
scale=1
trim_transparent=true

[profile fast]
label=Fast
mode=fast
optimize=gpu
padding=0
max_combinations=0
scale=1
trim_transparent=false

[profile css]
label=CSS Sprites
mode=fast
optimize=space
padding=0
max_combinations=0
scale=1
trim_transparent=false
